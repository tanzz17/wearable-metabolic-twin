# Base configuration
paths:
  raw_data_dir: data/raw/PAMAP2_Dataset/PAMAP2_Dataset/Protocol
  models_dir: models
  outputs_dir: outputs

windowing:
  # PAMAP2 sampling rate is ~100 Hz
  sampling_rate_hz: 100
  # Set to null to skip resampling. Example: 20 for 20 Hz.
  target_rate_hz: 20
  window_seconds: 5
  step_seconds: 2.5

features:
  # Use accel/gyro magnitudes + heart rate
  columns:
    - hand_accel_mag
    - chest_accel_mag
    - ankle_accel_mag
    - hand_gyro_mag
    - chest_gyro_mag
    - ankle_gyro_mag
    - heart_rate

activity_model:
  model_type: lgbm
  n_estimators: 300
  max_depth: -1
  learning_rate: 0.1
  num_leaves: 63

energy_model:
  n_estimators: 300
